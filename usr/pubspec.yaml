name: medpharm_ai
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  provider: ^6.0.5
  
  # Image handling for notes scanner
  image_picker: ^1.0.4
  
  # For flashcards (swipe gestures)
  flutter_card_swiper: ^7.0.0
  
  # For quiz results and progress charts
  fl_chart: ^0.66.1
  
  # HTTP for API calls (mock for now)
  http: ^1.1.0
  
  # Local storage for progress
  shared_preferences: ^2.2.2
  
  # Icons
  cupertino_icons: ^1.0.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/data/